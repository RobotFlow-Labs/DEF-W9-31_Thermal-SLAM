version: "3.8"

services:
  thermal-slam-serve:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: anima-thermal-slam:latest
    container_name: thermal-slam-serve
    profiles: ["serve", "api"]
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"
    environment:
      - ANIMA_MODULE_NAME=DEF-thermal-slam
      - ANIMA_MODULE_VERSION=0.1.0
      - ANIMA_SERVE_PORT=8080
      - ANIMA_DEVICE=auto
      - ANIMA_WEIGHT_FORMAT=auto
      - ANIMA_CONFIG=/app/configs/paper.toml
      - ANIMA_CHECKPOINT=${ANIMA_CHECKPOINT:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${ANIMA_WEIGHT_DIR:-./weights}:/data/weights
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  thermal-slam-ros2:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: anima-thermal-slam:latest
    container_name: thermal-slam-ros2
    profiles: ["ros2"]
    environment:
      - ANIMA_MODULE_NAME=DEF-thermal-slam
      - ANIMA_DEVICE=auto
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  thermal-slam-test:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: anima-thermal-slam:latest
    container_name: thermal-slam-test
    profiles: ["test"]
    command: ["python", "-m", "pytest", "tests/", "-v"]
    volumes:
      - ./tests:/app/tests
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
